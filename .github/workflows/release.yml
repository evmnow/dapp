name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.changeset/**'
      - 'packages/*/package.json'
      - 'packages/*/CHANGELOG.md'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm changeset publish
          title: 'Version Packages'
          commit: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag dapp release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/dapp/package.json').version")
          TAG="@evmnow/dapp@$VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
            exit 0
          fi

          NOTES="See packages/dapp/CHANGELOG.md for details."
          if [ -f packages/dapp/CHANGELOG.md ]; then
            EXTRACTED=$(awk -v v="$VERSION" '
              $1 == "##" && $2 == v { flag=1; next }
              /^## / && flag { exit }
              flag
            ' packages/dapp/CHANGELOG.md)
            if [[ -n "${EXTRACTED//[[:space:]]/}" ]]; then
              NOTES="$EXTRACTED"
            fi
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --target "$GITHUB_SHA"
